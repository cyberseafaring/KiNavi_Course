<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" stroke="#2F528F" stroke-width="2" fill="#E1F0FA"/>

  <!-- Wave pattern (ocean) -->
  <path d="M8 42 C16 38 24 46 32 42 C40 38 48 46 56 42" stroke="#4682B4" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M8 48 C16 44 24 52 32 48 C40 44 48 52 56 48" stroke="#B0CEE6" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Ship hull -->
  <path d="M20 36 L24 28 L40 28 L44 36 Z" fill="#4682B4" stroke="#2F528F" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Ship superstructure -->
