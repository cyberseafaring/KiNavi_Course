  <!-- Antenna/mast -->
  <line x1="32" y1="12" x2="32" y2="20" stroke="#2F528F" stroke-width="2" stroke-linecap="round"/>

  <!-- Signal waves (IoS connectivity) -->
  <path d="M26 14 C24 12 24 10 26 8" stroke="#489196" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M38 14 C40 12 40 10 38 8" stroke="#489196" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M22 16 C19 13 19 9 22 6" stroke="#489196" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M42 16 C45 13 45 9 42 6" stroke="#489196" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Central signal point -->
  <circle cx="32" cy="11" r="2" fill="#489196"/>
</svg>
